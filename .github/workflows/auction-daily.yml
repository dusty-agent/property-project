name: Daily Court Auction Collection

on:
  workflow_dispatch:

  schedule:
    # 매일 오전 6시 30분 KST
    # GitHub Actions cron은 UTC 기준입니다.
    - cron: "30 21 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 경매

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily auction collector
        run: python run_daily.py

      - name: Commit generated JSON
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "경매/output/json/auction_latest.json"
          git add "경매/output/json/auction_B000210_"*.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update Seoul Central auction listings"
            git push
          fi