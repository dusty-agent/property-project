name: Daily Seoul Central Auction

on:
  workflow_dispatch:

  schedule:
    - cron: "30 7 * * *"
      timezone: "Asia/Seoul"

jobs:
  collect-and-publish:
    name: Collect and publish auction data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout property project
        uses: actions/checkout@v4
        with:
          path: property-project

      - name: Checkout Dustie web
        uses: actions/checkout@v4
        with:
          repository: dusty-agent/dustie-web
          token: ${{ secrets.DUSTIE_REPO_TOKEN }}
          path: dustie-web
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: property-project/경매/requirements.txt

      - name: Install Python dependencies
        working-directory: property-project/경매
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect Seoul Central Court auctions
        working-directory: property-project/경매
        env:
          DUSTIE_DATA_DIR: ${{ github.workspace }}/dustie-web/public/data
          PYTHONUTF8: "1"
          TZ: "Asia/Seoul"
        run: |
          python run_daily.py

      - name: Validate generated JSON
        run: |
          test -f dustie-web/public/data/auction_latest.json

          python -m json.tool \
            dustie-web/public/data/auction_latest.json \
            > /dev/null

          echo "auction_latest.json validation completed."

      - name: Commit and push Dustie data
        working-directory: dustie-web
        run: |
          git config user.name "dustydraft"
          git config user.email "soyoung@dustydraft.com"

          git add public/data/auction_latest.json

          if git diff --cached --quiet; then
            echo "No auction data changes to commit."
            exit 0
          fi

          git commit -m "data: update Seoul Central auction listings"
          git push origin main